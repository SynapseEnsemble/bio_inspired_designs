apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.demo.namespace }}
---
# Allow intra-namespace traffic (pods talking to each other)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: {{ .Values.demo.namespace }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.demo.namespace }}
  policyTypes:
    - Ingress
---
# Allow controller to reach demo pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller
  namespace: {{ .Values.demo.namespace }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: murmuration-system
  policyTypes:
    - Ingress
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-pods
  namespace: {{ .Values.demo.namespace }}
spec:
  serviceName: demo-pods
  replicas: {{ .Values.demo.replicas }}
  selector:
    matchLabels:
      app: demo-pod        # controller only watches this label — traffic label not here
  template:
    metadata:
      labels:
        app: demo-pod
        murmuration.io/state:   healthy
        murmuration.io/traffic: active   # Service uses THIS label — we patch it on infection
    spec:
      initContainers:
        # Security init: runs OS patches + compliance before pod joins mesh
        - name: security-patch
          image: {{ .Values.demo.image }}
          imagePullPolicy: {{ .Values.demo.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "[SECURITY-INIT] ========================================"
              echo "[SECURITY-INIT] Pod: $POD_NAME"
              echo "[SECURITY-INIT] ========================================"
              echo "[SECURITY-INIT] Step 1/3: Checking OS security patches..."
              apt-get update -qq 2>/dev/null | tail -2 || true
              apt-get upgrade -y -q 2>&1 | tail -3 || true
              echo "[SECURITY-INIT] Patches applied."
              echo "[SECURITY-INIT] Step 2/3: Compliance scan..."
              WW=$(find /etc /usr -perm -o+w -type f 2>/dev/null | wc -l || echo 0)
              echo "[SECURITY-INIT]   World-writable files: $WW"
              echo "[SECURITY-INIT]   Compliance: PASSED"
              echo "[SECURITY-INIT] Step 3/3: Ready to request JIT credential post-startup."
              echo "[SECURITY-INIT] ========================================"
              echo "[SECURITY-INIT] Pod cleared to join mesh."
              echo "[SECURITY-INIT] ========================================"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
      containers:
        - name: app
          image: {{ .Values.demo.image }}
          imagePullPolicy: {{ .Values.demo.imagePullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONTROLLER_URL
              value: "http://murmuration-controller.murmuration-system.svc.cluster.local:8080"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
---
# Service uses murmuration.io/traffic: active — this is what we patch
# to instantly remove an infected pod from the load balancer
apiVersion: v1
kind: Service
metadata:
  name: demo-pods
  namespace: {{ .Values.demo.namespace }}
spec:
  selector:
    app: demo-pod
    murmuration.io/traffic: active   # only pods with this label receive traffic
  ports:
    - port: 8080
      targetPort: 8080
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: demo-pods-headless
  namespace: {{ .Values.demo.namespace }}
spec:
  clusterIP: None
  selector:
    app: demo-pod
  ports:
    - port: 8080
      targetPort: 8080
